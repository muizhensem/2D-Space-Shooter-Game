<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Shooter — 2D Space Shooter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0a0a12;
      font-family: 'Orbitron', sans-serif;
      color: #e0e8ff;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }
    #score, #lives {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }
    #lives { color: #ff6b6b; text-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 18, 0.92);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .overlay p {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      opacity: 0.9;
      margin-bottom: 1.5rem;
    }
    .overlay .final-score { margin-bottom: 1.5rem; font-size: 1.2rem; color: #00d4ff; }
    .btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.2em;
      padding: 0.9rem 2rem;
      border: 2px solid #00d4ff;
      background: transparent;
      color: #00d4ff;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: #00d4ff;
      color: #0a0a12;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }
    #start-overlay #instructions {
      margin-top: 1rem;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="canvas-container"></div>
    <div id="ui">
      <span id="score">SCORE: 0</span>
      <span id="lives">LIVES: 3</span>
    </div>
    <div id="start-overlay" class="overlay visible">
      <h1>VIBE SHOOTER</h1>
      <p>2D Space Shooter</p>
      <p id="instructions">ARROWS / WASD — Move &nbsp;|&nbsp; SPACE — Shoot</p>
      <button class="btn" id="btn-start">START GAME</button>
    </div>
    <div id="gameover-overlay" class="overlay">
      <h1>GAME OVER</h1>
      <p class="final-score">SCORE: <span id="final-score">0</span></p>
      <button class="btn" id="btn-restart">PLAY AGAIN</button>
    </div>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
